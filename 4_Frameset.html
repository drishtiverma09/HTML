<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frameset Example</title>
</head>

<frameset cols="40%,60%" border="5" noresize>

    <!-- Left Frame -->
    <frame name="Left" src="1_FormatingTag.html">

    <!-- Right Side divided into 4 rows -->
    <frameset rows="25%,25%,25%,25%" border="10" noresize>
        <frame name="Top" src="1_FormatingTag.html">
        <frame name="Middle" src="1_FormatingTag.html">
        <frame name="Last" src="1_FormatingTag.html">
        <frame name="Right" src="1_FormatingTag.html">
    </frameset>

</frameset>

</html>
