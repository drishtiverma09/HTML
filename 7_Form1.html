<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Types Demo</title>
</head>
<body>

<form action="submit.html">

    <label for="date">Date:</label>
    <input type="date" id="date" value="2024-01-26">
    <br>

    <label for="month">Month:</label>
    <input type="month" id="month" value="1976-10">
    <br>

    <label for="week">Week:</label>
    <input type="week" id="week" value="1976-W43">
    <br>

    <label for="time">Time:</label>
    <input type="time" id="time" value="22:30">
    <br>

    <label for="color">Color:</label>
    <input type="color" id="color" value="#ffffff">
    <br>

    <label for="lastname">Last Name:</label>
    <input type="text" id="lastname" name="lastname" value="Chitkara" disabled>
    <br>

    <input type="submit" value="Submit">

</form>

</body>
</html>
